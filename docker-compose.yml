services:

  backend:
    build: .
    ports:
      - "8000:8000"
    env_file: server/.env
    volumes:
      - ./data:/app/data        # persist sessions.db and hnswlib_index across restarts
    restart: unless-stopped

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"
    restart: unless-stopped
